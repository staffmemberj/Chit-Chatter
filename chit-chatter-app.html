<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Daily English Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #e0f7fa;
            --main-teal: #00838F;
            --bot-bg: #ffffff;
            --user-bg: #1e90ff;
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            height: 100dvh; 
            color: #2f3542;
            overflow: hidden;
        }

        /* Top Header */
        #header {
            background: var(--main-teal);
            color: white;
            padding: 1.5vh 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            flex-shrink: 0; 
        }

        .header-title {
            font-size: 2.5vh;
            font-weight: 700;
            display: flex;
            flex-direction: column;
        }

        #day-label {
            font-size: 1.5vh;
            color: #b2ebf2;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 2vw;
        }

        #progress-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.5vh 3vw;
            border-radius: 20px;
            font-size: 1.8vh;
            font-weight: 600;
            color: white;
        }

        /* Chat Area */
        #chat-window {
            flex: 1 1 0; 
            min-height: 15vh; 
            padding: 3vh 4vw;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 80%;
            padding: 1.5vh 4vw;
            border-radius: 20px;
            font-size: 2.2vh;
            line-height: 1.4;
            animation: popIn 0.4s var(--bounce) forwards;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
        }

        .bubble b {
            color: #ff4757;
            font-weight: 700;
            background: #ffeaa7;
            padding: 0 0.5vw;
            border-radius: 4px;
        }

        .bot-bubble {
            background: var(--bot-bg);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 2px solid #dfe4ea;
        }

        .user-bubble {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            border: 2px solid #0984e3;
        }

        .sys-bubble {
            background: #f1f2f6;
            color: #747d8c;
            align-self: center;
            font-size: 1.8vh;
            border: 2px dashed #ced6e0;
            box-shadow: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
        }

        .typing-indicator {
            display: flex;
            gap: 0.5vw;
            padding: 1vh 2vw;
            align-items: center;
            height: 2vh;
            flex-direction: row;
        }

        .dot {
            width: 0.8vh;
            height: 0.8vh;
            background: #a4b0be;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes popIn {
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Interaction Area */
        #interaction-area {
            background: #f1f2f6;
            border-top: 2px solid #dfe4ea;
            padding: 2vh 4vw calc(3vh + env(safe-area-inset-bottom)) 4vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            flex-shrink: 0; 
        }

        #interaction-area.hidden {
            transform: translateY(100%);
            display: none;
        }

        /* Text Input Box Container */
        #input-row {
            background: #ffffff;
            border: 2px solid #ced6e0;
            border-radius: 30px;
            min-height: 5.5vh;
            display: flex;
            align-items: center;
            padding: 0.5vh 1vw 0.5vh 3vw;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            flex-shrink: 0;
        }

        #sentence-builder {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8vh;
            align-items: center;
            min-height: 4vh;
            padding: 0.5vh 0;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 2.2vh;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .clear-btn { color: #a4b0be; padding: 1vh 2vw; }
        .clear-btn:active { transform: scale(0.8); }

        .send-btn {
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 5vh;
            height: 5vh;
            box-shadow: 0 3px 0 #218c53;
            margin-left: 0.5vw;
        }
        .send-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #218c53; }
        .send-btn svg { width: 2.2vh; height: 2.2vh; margin-right: 0.2vw; margin-top: 0.2vh; }

        /* Word Bank */
        #word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 1.5vh;
            min-height: 8vh;
            max-height: 30dvh; 
            overflow-y: auto;
        }

        .word-tile {
            background: #ffffff;
            color: #2f3542;
            padding: 1vh 3vw;
            border-radius: 12px;
            font-size: 2.2vh;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 3px 0 #ced6e0;
            border: 1px solid #dfe4ea;
            user-select: none;
            transition: all 0.1s;
        }
        .word-tile:active { transform: translateY(3px); box-shadow: 0 0px 0 #ced6e0; }

        .word-tile.in-builder {
            background: #1e90ff; color: white; box-shadow: 0 2px 0 #0984e3;
            border: 1px solid #0984e3; padding: 0.8vh 2.5vw; border-radius: 8px;
        }
        .word-tile.in-builder:active { transform: translateY(2px); box-shadow: 0 0px 0 #0984e3; }

        .word-tile.disabled-tile {
            background: #f1f2f6 !important; color: #a4b0be !important;
            border: 1px solid #dfe4ea !important; box-shadow: none !important;
            pointer-events: none; transform: none !important;
        }

        /* Action Row for Notes Button */
        .action-row {
            display: flex;
            justify-content: center;
        }

        #notes-btn {
            background: #ffa502;
            color: white;
            border: 2px solid #e58e26;
            padding: 1vh 4vw;
            font-size: 1.8vh;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #e58e26;
            transition: transform 0.1s;
            font-family: 'Fredoka', sans-serif;
            width: fit-content;
        }
        #notes-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #e58e26;
        }

        #desktop-hint { text-align: center; font-size: 1.6vh; color: #a4b0be; display: none; margin-top: -0.5vh;}
        
        .replay-btn {
            background: #1e90ff; color: white; border: 2px solid #0984e3; padding: 1vh 4vw;
            border-radius: 10px; font-family: 'Fredoka', sans-serif; font-size: 2vh;
            font-weight: 600; cursor: pointer; box-shadow: 0 3px 0 #0984e3; margin-top: 1vh;
        }
        .replay-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #0984e3; }

        /* --- Vocab Drawer CSS --- */
        #notes-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(2px); z-index: 2000;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #notes-overlay.show { opacity: 1; }

        #sidebar-content-container {
            position: fixed; right: -100%; top: 0; width: 90vw; max-width: 500px; height: 100dvh;
            background: white; z-index: 2001; transition: right 0.4s var(--bounce);
            border-left: 6px solid var(--main-teal); 
            box-shadow: -10px 0 20px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column;
        }
        #sidebar-content-container.open { right: 0; }

        .drawer-header {
            padding: 3vh 5vw 1vh 5vw;
            flex-shrink: 0;
            text-align: center;
        }
        .drawer-title { 
            color: var(--main-teal); font-size: 2.5vh; text-transform: uppercase; 
            margin: 0; 
        }
        .drawer-subtitle {
            font-size: 1.5vh; color: #747d8c; margin-top: 0.5vh;
        }

        #vocab-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 1vh 5vw; 
            position: relative;
        }

        .vocab-bottom-spacer { height: 12vh; width: 100%; }

        /* Single Column Layout for Vocab - Enforced 1 Line */
        .vocab-group-list { 
            margin: 0; padding: 0; list-style-type: none; 
            display: flex; flex-direction: column; gap: 1.2vh; 
            width: 100%;
        }
        
        .vocab-group-list li { 
            background: #f1f2f6; padding: 1.5vh 3vw; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
            border: 2px solid #dfe4ea; cursor: pointer; text-align: center;
            transition: transform 0.1s, border-color 0.1s;
            width: 100%; box-sizing: border-box;
        }
        .vocab-group-list li:active {
            transform: scale(0.98); background: #e0f7fa; border-color: var(--main-teal);
        }
        .vocab-en { 
            font-weight: bold; color: var(--main-teal); 
            font-size: clamp(16px, 2.2vh, 22px); 
            white-space: nowrap; 
        }
        .vocab-jp { 
            color: #2f3542; font-weight: 500;
            font-size: clamp(12px, 1.6vh, 18px); 
            white-space: nowrap; 
        }

        .drawer-footer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 2vh 5vw calc(2vh + env(safe-area-inset-bottom)) 5vw;
            box-sizing: border-box; background: linear-gradient(transparent, white 25%);
            pointer-events: none; 
        }

        .close-drawer-btn {
            background: #ff4757; color: white; border: 2px solid #d81b60; padding: 1.2vh;
            border-radius: 12px; font-size: 2vh; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #d81b60; width: 100%; 
            font-family: 'Fredoka', sans-serif; margin: 0; pointer-events: auto; 
        }
        .close-drawer-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d81b60; }

        @media (max-width: 768px) {
            #sidebar-content-container {
                right: auto; left: 0; bottom: -100%; top: auto; width: 100%; 
                height: 85dvh; max-width: none;
                border-left: none; border-top: 6px solid var(--main-teal); border-radius: 30px 30px 0 0;
                transition: bottom 0.4s var(--bounce); 
            }
            #sidebar-content-container.open { bottom: 0; }
        }

        /* Bubbly Scroll Indicators */
        .scroll-indicator {
            position: absolute; right: 4vw; background: rgba(255, 71, 87, 0.95); color: white;
            border-radius: 50%; width: 4.5vh; height: 4.5vh; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 2002; pointer-events: none; 
            opacity: 0; transition: opacity 0.3s ease;
        }
        .scroll-indicator svg { width: 2.5vh; height: 2.5vh; }
        .scroll-indicator.visible { opacity: 1; }

        .indicator-down { bottom: calc(10vh + env(safe-area-inset-bottom)); animation: bounceDownSide 1.5s infinite var(--bounce); }
        .indicator-up { top: 8vh; animation: bounceUpSide 1.5s infinite var(--bounce); }

        @keyframes bounceDownSide {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }
        @keyframes bounceUpSide {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(8px); }
            60% { transform: translateY(4px); }
        }

        /* --- Custom Word Detail Modal --- */
        #word-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 3000;
            opacity: 0; transition: opacity 0.3s ease;
            align-items: center; justify-content: center; padding: 4vw; box-sizing: border-box;
        }
        #word-modal-overlay.show { opacity: 1; }

        .word-modal-card {
            background: white; border-radius: 20px; width: 100%; max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden;
            transform: scale(0.9) translateY(20px); transition: transform 0.3s var(--bounce);
        }
        #word-modal-overlay.show .word-modal-card { transform: scale(1) translateY(0); }

        .wm-header {
            background: var(--main-teal); color: white; padding: 2.5vh 5vw;
            text-align: center; position: relative;
        }
        .wm-title { font-size: 3.5vh; font-weight: 700; margin: 0; letter-spacing: 1px;}
        .wm-jp { font-size: 1.8vh; color: #e0f7fa; margin-top: 0.5vh; font-weight: 600;}

        .wm-body { padding: 3vh 5vw; color: #2f3542; }
        
        .wm-section-title {
            font-size: 1.8vh; color: #747d8c; text-transform: uppercase; font-weight: 700;
            margin: 0 0 1vh 0; letter-spacing: 1px; border-bottom: 2px solid #f1f2f6; padding-bottom: 0.5vh;
        }

        .wm-explanation { font-size: 2vh; line-height: 1.5; margin-bottom: 2.5vh; }
        
        .wm-examples { list-style: none; padding: 0; margin: 0 0 2.5vh 0; }
        .wm-examples li {
            background: #f8f9fa; border-left: 4px solid #1e90ff; padding: 1.5vh 3vw;
            margin-bottom: 1vh; border-radius: 0 8px 8px 0; font-size: 1.8vh; line-height: 1.4;
        }

        .wm-footer { padding: 0 5vw 3vh 5vw; }
        .wm-close-btn {
            background: #f1f2f6; color: #2f3542; border: 2px solid #dfe4ea; padding: 1.5vh;
            border-radius: 12px; font-size: 2vh; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #dfe4ea; width: 100%; font-family: 'Fredoka', sans-serif;
        }
        .wm-close-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #dfe4ea; }

        .highlight-warn { color: #ff4757; font-weight: bold; }
        .highlight-good { color: #2ed573; font-weight: bold; }

    </style>
</head>
<body>

    <div id="header">
        <div class="header-title">
            <span id="day-label">Tuesday</span>
            Chat Practice
        </div>
        <div class="header-controls">
            <div id="progress-badge">0/0</div>
        </div>
    </div>

    <div id="chat-window">
        <!-- Chat bubbles inject here -->
    </div>

    <div id="interaction-area" class="hidden">
        <div id="input-row">
            <div id="sentence-builder"></div>
            <button class="icon-btn clear-btn" onclick="clearSentence()">✖</button>
            <button class="icon-btn send-btn" onclick="checkAnswer()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        
        <div id="word-bank"></div>
        
        <div class="action-row">
            <button id="notes-btn" onclick="toggleVocabDrawer('open')">📝 Notes</button>
        </div>

        <div id="desktop-hint">Press <b>Enter</b> to send &nbsp;|&nbsp; <b>Backspace</b> to delete</div>
    </div>

    <!-- Vocab Drawer & Overlay -->
    <div id="notes-overlay" onclick="toggleVocabDrawer('close')"></div>
    <div id="sidebar-content-container">
        
        <div class="drawer-header">
            <h3 class="drawer-title">📚 Vocabulary</h3>
            <div class="drawer-subtitle">Click a word for details!</div>
        </div>
        
        <!-- Scroll Indicators (Side) -->
        <div id="scroll-up-indicator" class="scroll-indicator indicator-up">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </div>
        
        <div id="vocab-container" onscroll="checkVocabScroll()">
            <ul class="vocab-group-list" id="vocab-list-ul">
                <!-- Injected via JS -->
            </ul>
            <div class="vocab-bottom-spacer"></div>
        </div>
        
        <div id="scroll-down-indicator" class="scroll-indicator indicator-down">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>

        <div class="drawer-footer">
            <button class="close-drawer-btn" onclick="toggleVocabDrawer('close')">✖️ Close Drawer</button>
        </div>
    </div>

    <!-- Word Detail Modal -->
    <div id="word-modal-overlay" onclick="handleModalOverlayClick(event)">
        <div class="word-modal-card">
            <div class="wm-header">
                <h2 class="wm-title" id="wm-title">Word</h2>
                <div class="wm-jp" id="wm-jp">~日本語~</div>
            </div>
            <div class="wm-body">
                <h4 class="wm-section-title">📝 Explanation</h4>
                <div class="wm-explanation" id="wm-explanation">Explanation text goes here.</div>
                
                <h4 class="wm-section-title">💡 Examples</h4>
                <ul class="wm-examples" id="wm-examples">
                    <!-- Injected via JS -->
                </ul>
            </div>
            <div class="wm-footer">
                <button class="wm-close-btn" onclick="closeWordModal()">Got it!</button>
            </div>
        </div>
    </div>

    <script>
        /* ========================================================================
        AUDIO CONFIGURATION
        Update these URLs with the ones used in your previous Guess What game!
        Currently pre-filled with high-quality free UI sounds.
        ======================================================================== */
        const soundMap = {
            tap: 'sound/typing.mp3',
            pop: 'sound/chat.mp3',
            correct: 'sound/victory.mp3',
            wrong: 'sound/wrong.mp3',
            slide: 'sound/slide.mp3',
            tada: 'sound/victory.mp3',
            send: 'sound/send.mp3'
        };

        const audioObjects = {};
        for (let key in soundMap) {
            audioObjects[key] = new Audio(soundMap[key]);
        }

        function playSound(type) {
            if (audioObjects[type]) {
                audioObjects[type].currentTime = 0;
                audioObjects[type].play().catch(e => console.log("Audio play prevented until user interacts with the page."));
            }
        }

        /* ========================================================================
        TEACHER CONFIGURATION AREA - LESSON 11 & 12
        Vocab items now include detailed explanations and example sentences.
        ======================================================================== */
        const weeklyLessonData = {
            2: { 
                vocab: [
                    { en: "after", jp: "~したあとで", 
                      explanation: "文と文をつなぐ接続詞、または名詞の前に置く前置詞として使います。「〜の後で」と順番を表します。",
                      examples: ["I will do my homework <span class='highlight-good'>after</span> dinner."] },
                    { en: "when", jp: "~のとき", 
                      explanation: "出来事が起こった時間・タイミングを表します。うしろには主語と動詞が続きます。",
                      examples: ["I came to Japan <span class='highlight-good'>when</span> I was ten."] },
                    { en: "until", jp: "~するまで(ずっと)", 
                      explanation: "ある時点までずっと、その動作や状態が<span class='highlight-warn'>継続すること</span>を示します。（※期限を表すbyとは違うので注意！）",
                      examples: ["I will stay here <span class='highlight-good'>until</span> Monday."] },
                    { en: "while", jp: "~する間に", 
                      explanation: "特定の期間や、別のことが起きている「最中」を表します。",
                      examples: ["Jim visited some temples <span class='highlight-good'>while</span> he was in Japan."] },
                    { en: "since", jp: "~以来(ずっと)", 
                      explanation: "過去のある時点から現在まで、ずっと続いていることを表します。",
                      examples: ["I have lived here <span class='highlight-good'>since</span> 2015."] },
                    { en: "before", jp: "~する前に", 
                      explanation: "出来事の順番を表します。afterの反対です。",
                      examples: ["Wash your hands <span class='highlight-good'>before</span> dinner."] },
                    { en: "around", jp: "~のまわりに", 
                      explanation: "場所だけでなく、時間の「だいたい〜時ごろ」を表すときにも使います。",
                      examples: ["They sat <span class='highlight-good'>around</span> the table.", "Let's meet <span class='highlight-good'>around</span> 3:00."] },
                    { en: "during", jp: "~の間に", 
                      explanation: "特定の期間を表す<span class='highlight-warn'>名詞の前</span>に置きます。（※whileはうしろに主語＋動詞が来ます！）",
                      examples: ["I read a lot of books <span class='highlight-good'>during</span> the summer."] },
                    { en: "among", jp: "(3つ以上)の間に", 
                      explanation: "3人以上、または3つ以上のグループの中にいるイメージです。",
                      examples: ["This song is popular <span class='highlight-good'>among</span> young people."] },
                    { en: "between", jp: "(2つ)の間に", 
                      explanation: "2つのものの間に使います。「between A and B」の形がテストでよく出ます！",
                      examples: ["I sat <span class='highlight-good'>between</span> Yuki and Ken."] },
                    { en: "beside", jp: "~のそばに",

        const emptyDayFallback = { vocab: [], questions: [] }; 

        // --- APP LOGIC ---
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const todayInt = new Date().getDay();
        const currentDayData = weeklyLessonData[todayInt] || emptyDayFallback;
        const currentChallengeArray = currentDayData.questions || [];
        
        const MAX_ATTEMPTS = 3;
        let isBotTyping = false;

        // Load State 
        let savedState = JSON.parse(localStorage.getItem('dailyChatProgress')) || {};
        
        if (savedState.day !== todayInt) {
            savedState = { 
                day: todayInt, qIndex: 0, completed: false, attempts: 0, score: 0, 
                scrollDownSeen: false, scrollUpSeen: false, scrollHintsCompleted: false 
            };
            saveProgress();
        }
        
        // Safety patch for existing users migrating formats
        if (savedState.scrollHintsCompleted === undefined) { savedState.scrollHintsCompleted = false; savedState.scrollDownSeen = false; savedState.scrollUpSeen = false; saveProgress(); }

        window.onload = () => {
            document.getElementById('day-label').innerText = dayNames[todayInt];
            updateProgressUI();
            renderVocab();
            checkDevice();
            
            if (currentChallengeArray.length === 0) {
                addBubble("No practice scheduled for today! Have a great day! 🎉", "sys-bubble");
                return;
            }

            if (savedState.completed) {
                showFinalScoreCard();
            } else {
                startNextQuestion();
            }
        };

        window.addEventListener('resize', scrollToBottom);

        function checkDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                document.getElementById('desktop-hint').style.display = 'block';
            }
        }

        document.addEventListener('keydown', function(event) {
            if (document.getElementById('interaction-area').classList.contains('hidden')) return;

            if (event.key === 'Enter') {
                event.preventDefault();
                checkAnswer();
            } else if (event.key === 'Backspace') {
                event.preventDefault();
                const builder = document.getElementById('sentence-builder');
                if (builder.lastChild) {
                    moveToBank(builder.lastChild); 
                }
            }
        });

        // --- VOCAB DRAWER LOGIC ---
        function renderVocab() {
            const ul = document.getElementById('vocab-list-ul');
            ul.innerHTML = '';
            
            if(!currentDayData.vocab) return;

            currentDayData.vocab.forEach(v => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="vocab-en">${v.en}</span><span class="vocab-jp">${v.jp}</span>`;
                
                // Add click listener to open modal
                li.onclick = () => {
                    playSound('tap');
                    openWordModal(v);
                };
                ul.appendChild(li);
            });
        }

        function toggleVocabDrawer(action) {
            const drawer = document.getElementById('sidebar-content-container');
            const overlay = document.getElementById('notes-overlay');
            const isOpen = drawer.classList.contains('open');
            let shouldOpen = action === 'open' ? true : (action === 'close' ? false : !isOpen);

            if (shouldOpen) {
                playSound('slide');
                drawer.classList.add('open');
                overlay.style.display = 'block';
                setTimeout(() => {
                    overlay.classList.add('show');
                    checkVocabScroll(); 
                }, 300);
            } else {
                playSound('tap');
                drawer.classList.remove('open');
                overlay.classList.remove('show');
                setTimeout(() => overlay.style.display = 'none', 400);
            }
        }

        // --- WORD DETAIL MODAL LOGIC ---
        function openWordModal(wordObj) {
            document.getElementById('wm-title').innerText = wordObj.en;
            document.getElementById('wm-jp').innerText = wordObj.jp;
            document.getElementById('wm-explanation').innerHTML = wordObj.explanation || "No details available.";
            
            const exUl = document.getElementById('wm-examples');
            exUl.innerHTML = '';
            
            if (wordObj.examples && wordObj.examples.length > 0) {
                wordObj.examples.forEach(ex => {
                    let li = document.createElement('li');
                    li.innerHTML = ex;
                    exUl.appendChild(li);
                });
            } else {
                let li = document.createElement('li');
                li.innerText = "No examples provided.";
                exUl.appendChild(li);
            }

            const modalOverlay = document.getElementById('word-modal-overlay');
            modalOverlay.style.display = 'flex';
            setTimeout(() => {
                modalOverlay.classList.add('show');
            }, 10);
        }

        function closeWordModal() {
            playSound('tap');
            const modalOverlay = document.getElementById('word-modal-overlay');
            modalOverlay.classList.remove('show');
            setTimeout(() => {
                modalOverlay.style.display = 'none';
            }, 300);
        }

        function handleModalOverlayClick(e) {
            if (e.target.id === 'word-modal-overlay') {
                closeWordModal();
            }
        }

        // --- DYNAMIC SCROLL HINTS LOGIC ---
        function checkVocabScroll() {
            if (savedState.scrollHintsCompleted) return;

            const container = document.getElementById('vocab-container');
            const downInd = document.getElementById('scroll-down-indicator');
            const upInd = document.getElementById('scroll-up-indicator');

            // If the list naturally fits everything without a scrollbar, hide hints forever
            if (container.scrollHeight <= container.clientHeight + 5) {
                savedState.scrollHintsCompleted = true;
                saveProgress();
                downInd.classList.remove('visible');
                upInd.classList.remove('visible');
                return;
            }

            const isAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 15;
            const isAtTop = container.scrollTop <= 15;

            if (isAtBottom && !savedState.scrollDownSeen) {
                savedState.scrollDownSeen = true;
                saveProgress();
            }

            if (savedState.scrollDownSeen && isAtTop && !savedState.scrollUpSeen) {
                savedState.scrollUpSeen = true;
                savedState.scrollHintsCompleted = true; 
                saveProgress();
            }

            if (!savedState.scrollDownSeen) {
                downInd.classList.add('visible');
                upInd.classList.remove('visible');
            } else if (!savedState.scrollUpSeen) {
                downInd.classList.remove('visible');
                upInd.classList.add('visible');
            } else {
                downInd.classList.remove('visible');
                upInd.classList.remove('visible');
            }
        }

        // --- CORE GAME FUNCTIONS ---
        function saveProgress() {
            localStorage.setItem('dailyChatProgress', JSON.stringify(savedState));
            updateProgressUI();
        }

        function updateProgressUI() {
            const total = currentChallengeArray.length;
            const current = savedState.completed ? total : savedState.qIndex;
            document.getElementById('progress-badge').innerText = `${current}/${total}`;
        }

        function resetDay() {
            playSound('tap');
            savedState = { day: todayInt, qIndex: 0, completed: false, attempts: 0, score: 0, scrollDownSeen: false, scrollUpSeen: false, scrollHintsCompleted: false };
            saveProgress();
            location.reload(); 
        }

        function showFinalScoreCard() {
            playSound('tada');
            const totalPossible = currentChallengeArray.length;
            let finalScore = (savedState.score || 0).toFixed(1);
            if (finalScore.endsWith('.0')) finalScore = parseInt(finalScore);

            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            bubble.className = `bubble sys-bubble`;
            bubble.innerHTML = `
                🎉 All done for today! <br>
                <b>Rating: ${finalScore} / ${totalPossible}</b>
                <button class="replay-btn" onclick="resetDay()">🔄 Try Again</button>
            `;
            chat.appendChild(bubble);
            playSound('pop');
            scrollToBottom();
        }

        function showTypingIndicator(callback, duration = 1200) {
            isBotTyping = true;
            const chat = document.getElementById('chat-window');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bubble bot-bubble typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            
            chat.appendChild(typingDiv);
            playSound('pop');
            scrollToBottom();

            setTimeout(() => {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                isBotTyping = false;
                callback();
            }, duration);
        }

        function startNextQuestion() {
            if (savedState.qIndex >= currentChallengeArray.length) {
                savedState.completed = true;
                saveProgress();
                showTypingIndicator(() => {
                    showFinalScoreCard();
                }, 1000);
                return;
            }

            const isLastQuestion = (savedState.qIndex === currentChallengeArray.length - 1);
            const questionData = currentChallengeArray[savedState.qIndex];

            if (isLastQuestion && savedState.attempts === 0) {
                showTypingIndicator(() => {
                    addBubble("Okay, last question for today! You've got this! 🔥", "bot-bubble");
                    setTimeout(() => {
                        showTypingIndicator(() => { presentPrompt(questionData); }, 1500);
                    }, 1000);
                }, 1000);
            } else {
                showTypingIndicator(() => { presentPrompt(questionData); }, 1200);
            }
        }

        function presentPrompt(questionData) {
            addBubble(questionData.prompt, "bot-bubble");
            
            if (savedState.attempts < MAX_ATTEMPTS) {
                setTimeout(() => {
                    renderWordBank(questionData.wordBank);
                    document.getElementById('interaction-area').classList.remove('hidden');
                    document.getElementById('interaction-area').style.display = 'flex';
                    scrollToBottom();
                }, 500);
            } else {
                advanceToNextSequence(questionData.failReply);
            }
        }

        function renderWordBank(words) {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            
            let shuffled = [...words].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(word => {
                let tile = document.createElement('div');
                tile.className = 'word-tile';
                tile.innerText = word;
                tile.onclick = () => moveToSentence(tile);
                bank.appendChild(tile);
            });
            clearSentence(true);
        }

        function moveToSentence(tile) {
            if (tile.classList.contains('disabled-tile')) return;
            playSound('tap');
            const builder = document.getElementById('sentence-builder');
            tile.onclick = () => moveToBank(tile);
            tile.classList.add('in-builder'); 
            builder.appendChild(tile);
            scrollToBottom(); 
        }

        function moveToBank(tile) {
            if (tile.classList.contains('disabled-tile')) return;
            playSound('tap');
            const bank = document.getElementById('word-bank');
            tile.onclick = () => moveToSentence(tile);
            tile.classList.remove('in-builder'); 
            bank.appendChild(tile);
            scrollToBottom(); 
        }

        function clearSentence(silent = false) {
            if(!silent) playSound('tap');
            const builder = document.getElementById('sentence-builder');
            while (builder.firstChild) {
                const tile = builder.firstChild;
                const bank = document.getElementById('word-bank');
                tile.onclick = () => moveToSentence(tile);
                tile.classList.remove('in-builder'); 
                bank.appendChild(tile);
            }
        }

        function addBubble(text, className) {
            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${className}`;
            bubble.innerHTML = text; 
            chat.appendChild(bubble);
            
            playSound('pop');
            
            scrollToBottom();
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat-window');
            setTimeout(() => { 
                chat.scrollTop = chat.scrollHeight; 
            }, 100);
        }

        function hideInteraction() {
            const area = document.getElementById('interaction-area');
            area.classList.add('hidden');
            setTimeout(() => { area.style.display = 'none'; }, 300); 
        }

        function advanceToNextSequence(botReplyText) {
            hideInteraction();
            showTypingIndicator(() => {
                addBubble(botReplyText, "bot-bubble");
                
                savedState.qIndex++;
                savedState.attempts = 0;
                saveProgress();

                setTimeout(() => { startNextQuestion(); }, 2000);
            }, 1500);
        }

        function checkAnswer() {
            const builder = document.getElementById('sentence-builder');
            const tiles = builder.querySelectorAll('.word-tile');
            if (tiles.length === 0) return;

            playSound('send');

            let userSentence = Array.from(tiles).map(t => t.innerText).join(" ");
            const currentQ = currentChallengeArray[savedState.qIndex];

            addBubble(userSentence, "user-bubble");
            
            let isCorrect = currentQ.validAnswers.includes(userSentence);

            if (isCorrect) {
                playSound('correct');
                clearSentence(true);
                hideInteraction();
                
                if (savedState.attempts === 0) savedState.score += 1;
                else if (savedState.attempts === 1) savedState.score += 0.8;
                else if (savedState.attempts === 2) savedState.score += 0.5;
                
                advanceToNextSequence("Spot on! Great job! 🌟");
            } else {
                playSound('wrong');
                let specificHint = null;
                if (currentQ.hints) {
                    for (let h of currentQ.hints) {
                        if (userSentence.includes(h.wrongWord)) {
                            specificHint = h.hint;
                            break; 
                        }
                    }
                }

                // Determine the longest correctly ordered prefix
                let maxMatch = 0;
                for (let valid of currentQ.validAnswers) {
                    let currentMatch = 0;
                    let builtString = "";
                    for (let i = 0; i < tiles.length; i++) {
                        builtString += (i > 0 ? " " : "") + tiles[i].innerText;
                        if (valid === builtString || valid.startsWith(builtString + " ")) {
                            currentMatch = i + 1;
                        } else {
                            break;
                        }
                    }
                    if (currentMatch > maxMatch) maxMatch = currentMatch;
                }

                // Move incorrectly ordered tiles back, and grey out distractors
                for (let i = 0; i < tiles.length; i++) {
                    let t = tiles[i];
                    let isDistractor = !currentQ.validAnswers.some(ans => ans.includes(t.innerText));
                    
                    if (i >= maxMatch) {
                        // move directly to bank without sounds
                        const bank = document.getElementById('word-bank');
                        t.onclick = () => moveToSentence(t);
                        t.classList.remove('in-builder'); 
                        bank.appendChild(t);
                    }

                    if (isDistractor) {
                        t.classList.add('disabled-tile');
                        t.onclick = null; 
                    }
                }

                savedState.attempts++;
                saveProgress();

                if (savedState.attempts >= MAX_ATTEMPTS) {
                    hideInteraction();
                    advanceToNextSequence(currentQ.failReply);
                } else {
                    hideInteraction();
                    showTypingIndicator(() => {
                        let left = MAX_ATTEMPTS - savedState.attempts;
                        let tryText = `<span style="display:block; margin-top:1vh; font-size: 0.8em; color: #a4b0be; text-align: right;">(${left} tries left)</span>`;
                        
                        let botMsg = specificHint 
                            ? `Hmm... ${specificHint} ${tryText}` 
                            : `Hmm, that doesn't sound quite right. Let's try again! ${tryText}`;
                            
                        addBubble(botMsg, "bot-bubble");
                        
                        setTimeout(() => {
                            document.getElementById('interaction-area').classList.remove('hidden');
                            document.getElementById('interaction-area').style.display = 'flex';
                            scrollToBottom();
                        }, 500);
                    }, 800);
                }
            }
        }
    </script>
