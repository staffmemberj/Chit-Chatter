<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily English Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #e0f7fa;
            --main-teal: #00838F;
            --bot-bg: #ffffff;
            --user-bg: #1e90ff;
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #2f3542;
            overflow: hidden;
        }

        /* Top Header */
        #header {
            background: var(--main-teal);
            color: white;
            padding: 1.5vh 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .header-title {
            font-size: 2.5vh;
            font-weight: 700;
            display: flex;
            flex-direction: column;
        }

        #day-label {
            font-size: 1.5vh;
            color: #b2ebf2;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        #progress-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.5vh 3vw;
            border-radius: 20px;
            font-size: 1.8vh;
            font-weight: 600;
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 3vh 4vw;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 80%;
            padding: 1.5vh 4vw;
            border-radius: 20px;
            font-size: 2.2vh;
            line-height: 1.4;
            animation: popIn 0.4s var(--bounce) forwards;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
        }

        .bot-bubble {
            background: var(--bot-bg);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 2px solid #dfe4ea;
        }

        .user-bubble {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            border: 2px solid #0984e3;
        }

        .sys-bubble {
            background: #f1f2f6;
            color: #747d8c;
            align-self: center;
            font-size: 1.8vh;
            border: 2px dashed #ced6e0;
            box-shadow: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 0.5vw;
            padding: 1vh 2vw;
            align-items: center;
            height: 2vh;
            flex-direction: row;
        }

        .dot {
            width: 0.8vh;
            height: 0.8vh;
            background: #a4b0be;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes popIn {
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Interaction Area (Texting App Style) */
        #interaction-area {
            background: #f1f2f6;
            border-top: 2px solid #dfe4ea;
            padding: 2vh 4vw 4vh 4vw;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        #interaction-area.hidden {
            transform: translateY(100%);
            display: none;
        }

        /* Text Input Box Container */
        #input-row {
            background: #ffffff;
            border: 2px solid #ced6e0;
            border-radius: 30px;
            min-height: 5.5vh;
            display: flex;
            align-items: center;
            padding: 0.5vh 1vw 0.5vh 3vw;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        #sentence-builder {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8vh;
            align-items: center;
            min-height: 4vh;
            padding: 0.5vh 0;
        }

        /* Inline Buttons */
        .icon-btn {
            background: none;
            border: none;
            font-size: 2.2vh;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .clear-btn {
            color: #a4b0be;
            padding: 1vh 2vw;
        }

        .clear-btn:active {
            transform: scale(0.8);
        }

        .send-btn {
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 5vh;
            height: 5vh;
            box-shadow: 0 3px 0 #218c53;
            margin-left: 0.5vw;
        }

        .send-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #218c53;
        }

        /* Paper Airplane SVG formatting */
        .send-btn svg {
            width: 2.2vh;
            height: 2.2vh;
            margin-right: 0.2vw; /* Center the icon visually */
            margin-top: 0.2vh;
        }

        /* Word Bank (Acts like a keyboard) */
        #word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5vh;
            min-height: 12vh;
            align-items: flex-start;
        }

        .word-tile {
            background: #ffffff;
            color: #2f3542;
            padding: 1.2vh 3.5vw;
            border-radius: 12px;
            font-size: 2.2vh;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 3px 0 #ced6e0;
            border: 1px solid #dfe4ea;
            user-select: none;
            transition: all 0.1s;
        }

        .word-tile:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #ced6e0;
        }

        /* Distinct look when moved to the sentence builder */
        .word-tile.in-builder {
            background: #1e90ff;
            color: white;
            box-shadow: 0 2px 0 #0984e3;
            border: 1px solid #0984e3;
            padding: 0.8vh 2.5vw;
            border-radius: 8px;
        }

        .word-tile.in-builder:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #0984e3;
        }

        /* Disabled / Greyed Out Distractor Tile */
        .word-tile.disabled-tile {
            background: #f1f2f6 !important;
            color: #a4b0be !important;
            border: 1px solid #dfe4ea !important;
            box-shadow: none !important;
            pointer-events: none;
            transform: none !important;
        }

        /* Desktop Hint */
        #desktop-hint {
            text-align: center;
            font-size: 1.6vh;
            color: #a4b0be;
            margin-top: -1vh;
            display: none; /* Hidden by default */
        }
        
        /* Replay Button Style */
        .replay-btn {
            background: #1e90ff;
            color: white;
            border: 2px solid #0984e3;
            padding: 1vh 4vw;
            border-radius: 10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 2vh;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #0984e3;
            margin-top: 1vh;
        }
        .replay-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0984e3;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="header-title">
            <span id="day-label">Tuesday</span>
            Chat Practice
        </div>
        <div id="progress-badge">0/0</div>
    </div>

    <div id="chat-window">
        <!-- Chat bubbles inject here -->
    </div>

    <div id="interaction-area" class="hidden">
        <div id="input-row">
            <div id="sentence-builder"></div>
            <button class="icon-btn clear-btn" onclick="clearSentence()">✖</button>
            <button class="icon-btn send-btn" onclick="checkAnswer()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div id="word-bank"></div>
        <div id="desktop-hint">Press <b>Enter</b> to send &nbsp;|&nbsp; <b>Backspace</b> to delete</div>
    </div>

    <script>
        /* ========================================================================
        TEACHER CONFIGURATION AREA - LESSON 11 & 12
        ======================================================================== */
        const weeklyLessonData = {
            2: [ 
                {
                    prompt: "Hey! Do you have any big plans for the summer? 🏖️",
                    wordBank: ["I", "want", "to", "read", "a", "lot", "of", "books", "during", "the", "summer", "vacation.", "while", "until"],
                    validAnswers: ["I want to read a lot of books during the summer vacation."],
                    failReply: "No worries! Let's talk about something else. 😅"
                },
                {
                    prompt: "Wow, your English is great! When did you move here? ✈️",
                    wordBank: ["I", "came", "to", "Japan", "when", "I", "was", "ten.", "during", "after"],
                    validAnswers: ["I came to Japan when I was ten."],
                    failReply: "Ah, I see! You must have been studying hard. 📚"
                },
                {
                    prompt: "Did Jim go sightseeing at all? 📸",
                    wordBank: ["Jim", "visited", "some", "temples", "while", "he", "was", "in", "Japan.", "during", "before"],
                    validAnswers: ["Jim visited some temples while he was in Japan."],
                    failReply: "I guess he mostly just relaxed. That's nice too! 🍵"
                },
                {
                    prompt: "Are you leaving on Sunday? 🎒",
                    wordBank: ["No,", "I", "will", "stay", "here", "until", "Monday.", "since", "while"],
                    validAnswers: ["No, I will stay here until Monday."],
                    failReply: "Got it! Have a safe trip whenever you go! 🚆"
                },
                {
                    prompt: "Wait, did she take the test without her bag? 🎒",
                    wordBank: ["Yes,", "she", "took", "the", "test", "without", "a", "dictionary.", "with", "around"],
                    validAnswers: ["Yes, she took the test without a dictionary."],
                    failReply: "She's brave! I always need my dictionary. 📖"
                }
            ],
            3: [ 
                {
                    prompt: "Why were you late this morning? ⏰",
                    wordBank: ["I", "met", "my", "teacher", "on", "my", "way", "to", "school.", "at", "in"],
                    validAnswers: ["I met my teacher on my way to school."],
                    failReply: "Ah well, at least you made it! 🏃‍♂️"
                },
                {
                    prompt: "Did she do okay on the test yesterday? 📝",
                    wordBank: ["No.", "She", "didn't", "study", "math", "at", "all.", "very", "much"],
                    validAnswers: ["No. She didn't study math at all."],
                    failReply: "Oh no... hopefully she does better next time! 😅"
                },
                {
                    prompt: "Why is John sleeping in the living room? 🛋️",
                    wordBank: ["He", "was", "so", "tired", "that", "he", "fell", "asleep", "on", "the", "sofa.", "very", "too"],
                    validAnswers: ["He was so tired that he fell asleep on the sofa."],
                    failReply: "Let's just let him rest. He had a long day. 🤫"
                },
                {
                    prompt: "Have you ever tried this food before? 🍣",
                    wordBank: ["No.", "I", "ate", "sushi", "for", "the", "first", "time", "yesterday.", "at", "last"],
                    validAnswers: ["No. I ate sushi for the first time yesterday."],
                    failReply: "It's an acquired taste, right? 😋"
                },
                {
                    prompt: "What did you buy at the mall today? 🛍️",
                    wordBank: ["I", "bought", "a", "pair", "of", "shoes.", "glass", "slice"],
                    validAnswers: ["I bought a pair of shoes."],
                    failReply: "Nice! Shopping is always fun. 👟"
                }
            ]
        };

        const emptyDayFallback = []; 

        // --- APP LOGIC ---
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const todayInt = new Date().getDay();
        const currentChallengeArray = weeklyLessonData[todayInt] || emptyDayFallback;
        
        const MAX_ATTEMPTS = 3;
        let isBotTyping = false;

        // Load State (Now includes score tracker)
        let savedState = JSON.parse(localStorage.getItem('dailyChatProgress')) || {};
        
        if (savedState.day !== todayInt) {
            savedState = { day: todayInt, qIndex: 0, completed: false, attempts: 0, score: 0 };
            saveProgress();
        }

        window.onload = () => {
            document.getElementById('day-label').innerText = dayNames[todayInt];
            updateProgressUI();
            checkDevice();
            
            if (currentChallengeArray.length === 0) {
                addBubble("No practice scheduled for today! Have a great day! 🎉", "sys-bubble");
                return;
            }

            if (savedState.completed) {
                showFinalScoreCard();
            } else {
                startNextQuestion();
            }
        };

        // --- DEVICE DETECTION & KEYBOARD SUPPORT ---
        function checkDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (!isMobile) {
                document.getElementById('desktop-hint').style.display = 'block';
            }
        }

        document.addEventListener('keydown', function(event) {
            if (document.getElementById('interaction-area').classList.contains('hidden')) return;

            if (event.key === 'Enter') {
                event.preventDefault();
                checkAnswer();
            } else if (event.key === 'Backspace') {
                event.preventDefault();
                const builder = document.getElementById('sentence-builder');
                if (builder.lastChild) {
                    moveToBank(builder.lastChild); 
                }
            }
        });

        // --- GAME FUNCTIONS ---
        function saveProgress() {
            localStorage.setItem('dailyChatProgress', JSON.stringify(savedState));
            updateProgressUI();
        }

        function updateProgressUI() {
            const total = currentChallengeArray.length;
            const current = savedState.completed ? total : savedState.qIndex;
            document.getElementById('progress-badge').innerText = `${current}/${total}`;
        }

        function resetDay() {
            savedState = { day: todayInt, qIndex: 0, completed: false, attempts: 0, score: 0 };
            saveProgress();
            location.reload(); // Reloads the page for a clean conversational slate
        }

        function showFinalScoreCard() {
            const totalPossible = currentChallengeArray.length;
            let finalScore = (savedState.score || 0).toFixed(1);
            if (finalScore.endsWith('.0')) finalScore = parseInt(finalScore);

            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            bubble.className = `bubble sys-bubble`;
            bubble.innerHTML = `
                🎉 All done for today! <br>
                <b>Rating: ${finalScore} / ${totalPossible}</b>
                <button class="replay-btn" onclick="resetDay()">🔄 Try Again</button>
            `;
            chat.appendChild(bubble);
            scrollToBottom();
        }

        function showTypingIndicator(callback, duration = 1200) {
            isBotTyping = true;
            const chat = document.getElementById('chat-window');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bubble bot-bubble typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            
            chat.appendChild(typingDiv);
            scrollToBottom();

            setTimeout(() => {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                isBotTyping = false;
                callback();
            }, duration);
        }

        function startNextQuestion() {
            if (savedState.qIndex >= currentChallengeArray.length) {
                savedState.completed = true;
                saveProgress();
                showTypingIndicator(() => {
                    showFinalScoreCard();
                }, 1000);
                return;
            }

            const isLastQuestion = (savedState.qIndex === currentChallengeArray.length - 1);
            const questionData = currentChallengeArray[savedState.qIndex];

            if (isLastQuestion && savedState.attempts === 0) {
                showTypingIndicator(() => {
                    addBubble("Okay, last question for today! You've got this! 🔥", "bot-bubble");
                    setTimeout(() => {
                        showTypingIndicator(() => { presentPrompt(questionData); }, 1500);
                    }, 1000);
                }, 1000);
            } else {
                showTypingIndicator(() => { presentPrompt(questionData); }, 1200);
            }
        }

        function presentPrompt(questionData) {
            addBubble(questionData.prompt, "bot-bubble");
            
            if (savedState.attempts < MAX_ATTEMPTS) {
                setTimeout(() => {
                    renderWordBank(questionData.wordBank);
                    document.getElementById('interaction-area').classList.remove('hidden');
                    document.getElementById('interaction-area').style.display = 'flex';
                }, 500);
            } else {
                advanceToNextSequence(questionData.failReply);
            }
        }

        function renderWordBank(words) {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            
            let shuffled = [...words].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(word => {
                let tile = document.createElement('div');
                tile.className = 'word-tile';
                tile.innerText = word;
                tile.onclick = () => moveToSentence(tile);
                bank.appendChild(tile);
            });
            clearSentence();
        }

        function moveToSentence(tile) {
            if (tile.classList.contains('disabled-tile')) return; // Ignore if greyed out
            const builder = document.getElementById('sentence-builder');
            tile.onclick = () => moveToBank(tile);
            tile.classList.add('in-builder'); 
            builder.appendChild(tile);
        }

        function moveToBank(tile) {
            if (tile.classList.contains('disabled-tile')) return;
            const bank = document.getElementById('word-bank');
            tile.onclick = () => moveToSentence(tile);
            tile.classList.remove('in-builder'); 
            bank.appendChild(tile);
        }

        function clearSentence() {
            const builder = document.getElementById('sentence-builder');
            while (builder.firstChild) {
                moveToBank(builder.firstChild);
            }
        }

        function addBubble(text, className) {
            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${className}`;
            bubble.innerText = text;
            chat.appendChild(bubble);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat-window');
            setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
        }

        function hideInteraction() {
            const area = document.getElementById('interaction-area');
            area.classList.add('hidden');
            setTimeout(() => { area.style.display = 'none'; }, 300); 
        }

        function advanceToNextSequence(botReplyText) {
            hideInteraction();
            showTypingIndicator(() => {
                addBubble(botReplyText, "bot-bubble");
                
                savedState.qIndex++;
                savedState.attempts = 0;
                saveProgress();

                setTimeout(() => { startNextQuestion(); }, 2000);
            }, 1500);
        }

        // Feature: Grey out a distractor word to help the user
        function greyOutDistractor(currentQ) {
            // Find words that belong to the correct answer
            let validWords = new Set();
            currentQ.validAnswers.forEach(ans => {
                ans.split(" ").forEach(w => validWords.add(w));
            });

            // Look at words currently sitting in the word bank
            const bank = document.getElementById('word-bank');
            const tiles = Array.from(bank.querySelectorAll('.word-tile:not(.disabled-tile)'));
            
            // Filter out tiles that are NOT part of the valid answer
            const distractors = tiles.filter(t => !validWords.has(t.innerText));

            if (distractors.length > 0) {
                // Randomly select one distractor to disable
                const targetTile = distractors[Math.floor(Math.random() * distractors.length)];
                targetTile.classList.add('disabled-tile');
                targetTile.onclick = null; // Remove click listener
            }
        }

        function checkAnswer() {
            const builder = document.getElementById('sentence-builder');
            const tiles = builder.querySelectorAll('.word-tile');
            if (tiles.length === 0) return;

            let userSentence = Array.from(tiles).map(t => t.innerText).join(" ");
            const currentQ = currentChallengeArray[savedState.qIndex];

            addBubble(userSentence, "user-bubble");
            
            let isCorrect = currentQ.validAnswers.includes(userSentence);

            if (isCorrect) {
                clearSentence();
                hideInteraction();
                
                // Award points based on attempts
                if (savedState.attempts === 0) savedState.score += 1;
                else if (savedState.attempts === 1) savedState.score += 0.8;
                else if (savedState.attempts === 2) savedState.score += 0.5;
                
                advanceToNextSequence("Spot on! Great job! 🌟");
            } else {
                // Grey out one wrong word if this is their first failure
                if (savedState.attempts === 0) {
                    greyOutDistractor(currentQ);
                }

                // Send incorrect words back to bank
                clearSentence();

                savedState.attempts++;
                saveProgress();

                if (savedState.attempts >= MAX_ATTEMPTS) {
                    hideInteraction();
                    advanceToNextSequence(currentQ.failReply);
                } else {
                    hideInteraction();
                    showTypingIndicator(() => {
                        let left = MAX_ATTEMPTS - savedState.attempts;
                        addBubble(`Hmm, that doesn't sound quite right. Let's try again! (${left} tries left)`, "sys-bubble");
                        
                        setTimeout(() => {
                            document.getElementById('interaction-area').classList.remove('hidden');
                            document.getElementById('interaction-area').style.display = 'flex';
                        }, 500);
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
